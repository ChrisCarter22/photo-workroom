name: Bootstrap Validation

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  bootstrap:
    name: bootstrap-${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20.20.0'
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1
          components: rustfmt, clippy

      - name: Install Linux Tauri dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev patchelf xvfb

      - name: Run bootstrap verification
        run: |
          npm ci
          npm run verify:local

      - name: Run desktop launch smoke (Linux)
        if: runner.os == 'Linux'
        run: xvfb-run --auto-servernum --server-args="-screen 0 1280x800x24" npm run test:tauri-launch

      - name: Run desktop launch smoke (macOS and Windows)
        if: runner.os != 'Linux'
        run: npm run test:tauri-launch
